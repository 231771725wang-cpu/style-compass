<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Style Compass</title>
    <meta http-equiv="refresh" content="0; url=assets/gallery/style-gallery.html" />
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #050505;
        color: #f5f5ef;
        font-family: "Helvetica Neue", Arial, sans-serif;
      }
      .shell {
        width: min(720px, calc(100vw - 32px));
        padding: 28px;
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: #0d0d0d;
      }
      .eyebrow {
        display: inline-block;
        margin-bottom: 14px;
        padding: 8px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      h1 {
        margin: 0 0 10px;
        font-size: clamp(30px, 5vw, 52px);
        line-height: 0.95;
        letter-spacing: -0.05em;
      }
      p {
        margin: 0 0 18px;
        color: #b7b7b0;
        line-height: 1.6;
      }
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 16px;
        border-radius: 999px;
        background: #f5f5ef;
        color: #050505;
        text-decoration: none;
        font-size: 13px;
        font-weight: 800;
      }
      code {
        display: inline-block;
        margin-top: 14px;
        color: #d9d9d2;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        padding: 8px 10px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="eyebrow">STYLE GALLERY</div>
      <h1>Style Compass</h1>
      <p>这是风格罗盘（style-compass）的 GitHub Pages 友好入口。若启用 GitHub Pages，可直接从仓库根路径进入总览。</p>
      <a href="assets/gallery/style-gallery.html">打开总览（Open Gallery）</a>
      <br />
      <code>assets/gallery/style-gallery.html</code>
    </main>
    <script>
      window.location.replace("assets/gallery/style-gallery.html");
    </script>
  </body>
</html>
