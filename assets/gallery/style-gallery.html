<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>风格总览（Style Gallery）</title>
    <style>
      :root {
        --bg: #040404;
        --panel: #0b0b0b;
        --panel-soft: #101010;
        --panel-muted: #151515;
        --field: #111111;
        --line: rgba(255, 255, 255, 0.12);
        --line-strong: rgba(255, 255, 255, 0.24);
        --text: #f7f7f2;
        --muted: #a6a6a0;
        --muted-soft: #7d7d77;
        --accent: #ffffff;
        --chip: rgba(255, 255, 255, 0.05);
        --shadow: none;
        --radius-xl: 14px;
        --radius-lg: 12px;
        --radius-md: 10px;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Helvetica Neue", Arial, sans-serif;
        color: var(--text);
        background: linear-gradient(180deg, #030303 0%, #080808 52%, #050505 100%);
      }
      .shell {
        width: min(1520px, calc(100vw - 24px));
        margin: 14px auto 36px;
        display: grid;
        gap: 18px;
      }
      .section-card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow);
      }
      .masthead {
        padding: 24px 26px;
        display: grid;
        gap: 20px;
      }
      .masthead-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
      }
      .eyebrow {
        display: inline-flex;
        padding: 8px 11px;
        border-radius: 999px;
        background: var(--chip);
        color: #f3f3ee;
        font-size: 12px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        font-weight: 800;
      }
      .lang-toggle {
        display: inline-flex;
        gap: 6px;
        padding: 4px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.01);
      }
      .lang-toggle button {
        border: 0;
        background: transparent;
        color: var(--muted);
        padding: 9px 13px;
        border-radius: 999px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 700;
      }
      .lang-toggle button.active {
        background: #f5f5ef;
        color: #050505;
      }
      .masthead-content {
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) minmax(320px, 520px);
        gap: 22px;
        align-items: start;
      }
      .hero-copy-wrap {
        display: grid;
        gap: 12px;
      }
      h1 {
        margin: 0;
        font-family: "Arial Black", "Helvetica Neue", Arial, sans-serif;
        font-size: clamp(40px, 6.2vw, 76px);
        line-height: 0.92;
        letter-spacing: -0.05em;
        font-weight: 900;
        max-width: 10ch;
      }
      .hero-copy {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.55;
        max-width: 460px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .hero-meta {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .hero-meta span {
        padding: 9px 12px;
        border-radius: var(--radius-md);
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #d6d6cf;
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .hero-guide {
        display: grid;
        gap: 10px;
        padding: 16px 18px;
        border-radius: var(--radius-lg);
        border: 1px solid var(--line);
        background: var(--panel-soft);
        max-width: 560px;
      }
      .hero-guide h2 {
        margin: 0;
        font-size: 16px;
        color: var(--text);
        letter-spacing: -0.02em;
      }
      .hero-guide p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.6;
      }
      .hero-guide code {
        display: inline-block;
        padding: 6px 9px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: #ecece5;
        font-size: 12px;
      }
      .hero-guide-label {
        display: block;
        color: var(--muted-soft);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 6px;
      }
      .hero-guide ol {
        margin: 0;
        padding-left: 18px;
        color: #e7e7e1;
        font-size: 13px;
        line-height: 1.6;
      }
      .hero-guide li + li {
        margin-top: 4px;
      }
      .hero-guide-links {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .hero-guide-links a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 38px;
        padding: 0 14px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.02);
        color: var(--text);
        text-decoration: none;
        font-size: 12px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        font-weight: 700;
      }
      .hero-guide-links a:hover {
        border-color: var(--line-strong);
      }
      .filters {
        display: grid;
        gap: 12px;
        padding: 16px;
        border-radius: var(--radius-lg);
        border: 1px solid var(--line);
        background: var(--panel-soft);
      }
      .filters-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: flex-start;
        flex-wrap: wrap;
      }
      .filters-hint {
        color: var(--muted-soft);
        font-size: 12px;
        max-width: 320px;
        text-align: right;
      }
      .filters h2,
      .section-eyebrow {
        margin: 0;
        font-size: 12px;
        color: #f2f2ed;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        font-weight: 800;
      }
      .toolbar-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }
      .toolbar-grid .field:first-child {
        grid-column: 1 / -1;
      }
      .field {
        display: grid;
        gap: 7px;
      }
      .field label {
        font-size: 12px;
        color: #d6d6cf;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .field input,
      .field select {
        width: 100%;
        border: 1px solid var(--line);
        background: var(--field);
        color: var(--text);
        border-radius: 8px;
        padding: 12px 13px;
        outline: none;
      }
      .field input:focus,
      .field select:focus {
        border-color: rgba(255, 255, 255, 0.5);
        box-shadow: none;
      }
      .hidden {
        display: none !important;
      }
      .section-card {
        padding: 22px 24px;
        scroll-margin-top: 88px;
      }
      .results-toolbar-shell {
        position: sticky;
        top: 12px;
        z-index: 30;
        border: 1px solid var(--line-strong);
        border-radius: 12px;
        background: rgba(7, 7, 7, 0.96);
        backdrop-filter: blur(10px);
        padding: 12px 14px;
      }
      .results-toolbar-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 10px;
      }
      .results-toolbar-head h2 {
        margin: 0;
        font-family: "Arial Black", "Helvetica Neue", Arial, sans-serif;
        font-size: 18px;
        text-transform: uppercase;
        letter-spacing: -0.03em;
      }
      .results-toolbar-copy {
        margin: 0;
        color: var(--muted-soft);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .results-toolbar-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.3fr) repeat(2, minmax(180px, 0.8fr)) auto;
        gap: 10px;
        align-items: end;
      }
      .results-toolbar-grid .field:first-child {
        grid-column: 1 / 3;
      }
      .results-toolbar-grid .toolbar-actions {
        justify-self: end;
      }
      .toolbar-actions {
        display: flex;
        gap: 8px;
        align-items: end;
      }
      .toolbar-actions button {
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: transparent;
        color: var(--text);
        border-radius: 8px;
        padding: 12px 14px;
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        cursor: pointer;
        white-space: nowrap;
      }
      .toolbar-actions button.primary {
        background: #f5f5ef;
        border-color: #f5f5ef;
        color: #050505;
      }
      .results-nav-shell {
        padding: 14px 16px;
        display: grid;
        gap: 12px;
      }
      .results-nav-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: end;
      }
      .results-nav-head h2 {
        margin: 0;
        font-family: "Arial Black", "Helvetica Neue", Arial, sans-serif;
        font-size: 18px;
        text-transform: uppercase;
      }
      .results-nav-copy {
        margin: 0;
        color: var(--muted-soft);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .results-nav-lines {
        display: grid;
        gap: 10px;
      }
      .results-nav-line {
        display: grid;
        grid-template-columns: 96px minmax(0, 1fr);
        gap: 12px;
        align-items: start;
      }
      .results-nav-label {
        padding-top: 8px;
        font-size: 11px;
        color: #f0f0ea;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 800;
      }
      .compact-chip-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .compact-chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 42px;
        padding: 6px 10px 6px 6px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.03);
        color: #e8e8e2;
        text-decoration: none;
      }
      .compact-chip:hover {
        border-color: rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.05);
      }
      .compact-chip img {
        width: 32px;
        height: 32px;
        border-radius: 999px;
        background: #0c0c0c;
        padding: 4px;
        object-fit: contain;
        flex: 0 0 auto;
      }
      .compact-chip-icon {
        width: 32px;
        height: 32px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.08);
        color: #f7f7f2;
        font-size: 9px;
        font-weight: 800;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        flex: 0 0 auto;
      }
      .thumb-media {
        position: relative;
      }
      .compact-chip-text {
        display: grid;
        gap: 2px;
        min-width: 0;
      }
      .compact-chip-title {
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #f7f7f2;
        white-space: nowrap;
      }
      .compact-chip-subtitle {
        font-size: 10px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        white-space: nowrap;
      }
      .section-head {
        display: flex;
        justify-content: space-between;
        gap: 14px;
        align-items: start;
        margin-bottom: 14px;
        padding-bottom: 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }
      .section-head h2 {
        margin: 4px 0 4px;
        font-family: "Arial Black", "Helvetica Neue", Arial, sans-serif;
        font-size: clamp(24px, 3vw, 38px);
        letter-spacing: -0.04em;
        line-height: 0.96;
        font-weight: 900;
        text-transform: uppercase;
      }
      .section-copy {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
        max-width: 460px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .rank-strip {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 16px;
      }
      .rank-card {
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        background: var(--panel-soft);
        overflow: hidden;
        display: grid;
        grid-template-rows: auto 1fr;
        min-height: 100%;
      }
      .rank-card img {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 10;
        object-fit: contain;
        padding: 12px;
        background: #0a0a0a;
        filter: saturate(0.92) contrast(1.02);
      }
      .thumb-fallback {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        aspect-ratio: 16 / 10;
        border-radius: 8px;
        background: #0a0a0a;
        border: 1px dashed rgba(255, 255, 255, 0.12);
        color: #d9d9d3;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 12px;
        text-align: center;
      }
      .rank-body {
        padding: 14px;
        display: grid;
        grid-template-rows: auto auto auto 1fr auto;
        gap: 10px;
      }
      .rank-top {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        align-items: center;
      }
      .rank-badge,
      .layout-pill,
      .mini-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 6px 9px;
        border-radius: 999px;
        font-size: 10px;
        font-weight: 700;
        background: rgba(255, 255, 255, 0.06);
        color: #efefe8;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .rank-card h3,
      .mini-card h4,
      .full-card h3 {
        margin: 0;
        letter-spacing: -0.02em;
      }
      .rank-card h3 {
        font-family: "Arial Black", "Helvetica Neue", Arial, sans-serif;
        font-size: 26px;
        line-height: 0.98;
        text-transform: uppercase;
      }
      .rank-card p,
      .mini-card p,
      .full-card p,
      .meta dd {
        margin: 0;
        color: var(--muted);
      }
      .rank-category {
        font-size: 12px;
        color: #f0f0ea;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .clamp-2,
      .clamp-3 {
        display: -webkit-box;
        overflow: hidden;
        -webkit-box-orient: vertical;
      }
      .clamp-2 {
        -webkit-line-clamp: 2;
      }
      .clamp-3 {
        -webkit-line-clamp: 3;
      }
      .rank-actions,
      .card-actions {
        display: flex;
        gap: 10px;
      }
      .rank-actions a,
      .card-actions a {
        flex: 1;
        text-align: center;
        text-decoration: none;
        padding: 11px 12px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: var(--text);
        background: transparent;
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .rank-actions a.primary,
      .card-actions a.primary {
        background: #f5f5ef;
        color: #050505;
        border-color: #f5f5ef;
      }
      .preview-modal {
        position: fixed;
        inset: 0;
        z-index: 80;
        display: grid;
        place-items: center;
        padding: 22px;
      }
      .preview-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.74);
        backdrop-filter: blur(12px);
      }
      .preview-panel {
        position: relative;
        z-index: 1;
        width: min(960px, 100%);
        max-height: min(860px, calc(100vh - 44px));
        overflow: auto;
        display: grid;
        grid-template-columns: minmax(280px, 0.9fr) minmax(0, 1.1fr);
        gap: 18px;
        padding: 18px;
        border-radius: 14px;
        border: 1px solid var(--line-strong);
        background: #080808;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.46);
      }
      .preview-panel .thumb-media img,
      .preview-panel .thumb-fallback {
        width: 100%;
        border-radius: 10px;
      }
      .preview-body {
        display: grid;
        gap: 12px;
        align-content: start;
      }
      .preview-header {
        display: flex;
        justify-content: space-between;
        align-items: start;
        gap: 12px;
      }
      .preview-header h2 {
        margin: 0;
        font-family: "Arial Black", "Helvetica Neue", Arial, sans-serif;
        font-size: clamp(30px, 5vw, 54px);
        line-height: 0.95;
        text-transform: uppercase;
      }
      .preview-close {
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        border-radius: 999px;
        width: 38px;
        height: 38px;
        cursor: pointer;
        font-size: 20px;
        line-height: 1;
      }
      .preview-summary {
        margin: 0;
        color: #d6d6cf;
        font-size: 14px;
        line-height: 1.55;
      }
      .preview-note {
        margin: 0;
        color: var(--muted-soft);
        font-size: 12px;
        line-height: 1.5;
      }
      .preview-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .preview-actions a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 40px;
        padding: 0 14px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: var(--text);
        text-decoration: none;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .preview-actions a.primary {
        background: #f5f5ef;
        color: #050505;
        border-color: #f5f5ef;
      }
      body.preview-open {
        overflow: hidden;
      }
      .category-hot-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
      }
      .category-panel {
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: var(--radius-lg);
        background: #090909;
        padding: 14px;
        display: grid;
        gap: 12px;
      }
      .category-panel-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }
      .category-panel-head h3 {
        margin: 0;
        font-family: "Arial Black", "Helvetica Neue", Arial, sans-serif;
        font-size: 20px;
        text-transform: uppercase;
      }
      .mini-list {
        display: grid;
        gap: 10px;
      }
      .mini-card {
        display: grid;
        grid-template-columns: 132px 1fr;
        gap: 12px;
        padding: 12px;
        border-radius: 10px;
        background: var(--panel-muted);
        border: 1px solid rgba(255, 255, 255, 0.04);
      }
      .mini-card img {
        width: 132px;
        height: 94px;
        object-fit: contain;
        padding: 8px;
        border-radius: 8px;
        background: #0c0c0c;
      }
      .mini-thumb-fallback {
        width: 132px;
        height: 94px;
      }
      .mini-card-body {
        display: grid;
        gap: 6px;
      }
      .mini-card-body h4 {
        font-family: "Arial Black", "Helvetica Neue", Arial, sans-serif;
        font-size: 18px;
        text-transform: uppercase;
      }
      .catalog-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
      }
      .catalog-head h2 {
        margin: 0;
        font-family: "Arial Black", "Helvetica Neue", Arial, sans-serif;
        font-size: clamp(24px, 3vw, 38px);
        text-transform: uppercase;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 16px;
      }
      .results-meta {
        display: grid;
        gap: 10px;
        margin-bottom: 14px;
      }
      .results-meta-top {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .results-chip-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .results-chip {
        display: inline-flex;
        align-items: center;
        padding: 8px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        font-size: 11px;
        color: #ecece6;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .empty-state {
        border: 1px dashed rgba(255, 255, 255, 0.14);
        border-radius: 12px;
        padding: 28px 24px;
        text-align: center;
        display: grid;
        gap: 12px;
        background: rgba(255, 255, 255, 0.02);
      }
      .empty-state h3 {
        margin: 0;
        font-family: "Arial Black", "Helvetica Neue", Arial, sans-serif;
        font-size: 26px;
        text-transform: uppercase;
      }
      .empty-state p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
      }
      .empty-state-actions {
        display: flex;
        justify-content: center;
        gap: 10px;
      }
      .empty-state-actions button {
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: transparent;
        color: var(--text);
        border-radius: 8px;

        color: #050505;

      .full-card {

        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 14px;
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 14px;
        min-height: 500px;
      }
      .thumb-wrap {
        padding: 0;
      }
      .thumb-wrap img {
        display: block;

        padding: 12px;

        display: grid;
        grid-template-rows: auto auto auto auto 1fr auto;
        gap: 10px;
      }
      .card-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

        font-size: 28px;
        line-height: 0.98;
        text-transform: uppercase;
      }
      .category-line {
        font-size: 12px;
        color: #f0f0ea;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .summary {
        font-size: 12px;
        line-height: 1.5;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .meta {
        display: grid;
        gap: 8px;
        margin: 0;
      }
      .meta div {
        display: grid;
        grid-template-columns: 40px 1fr;
        gap: 10px;
        font-size: 11px;
      }
      .meta dt {
        color: #efefe8;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .meta dd {
        display: -webkit-box;
        overflow: hidden;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
      }
      .card-actions {
        margin-top: auto;
      }
      @media (max-width: 1180px) {
        .masthead-content {
          grid-template-columns: 1fr;
        }

          width: 100%;
        }
      }
      @media (max-width: 980px) {
        .rank-strip,
        .category-hot-grid,
        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
        .results-toolbar-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
        .results-toolbar-grid .field:first-child {
          grid-column: 1 / -1;
        }
        .results-toolbar-grid .toolbar-actions {
          grid-column: 1 / -1;
          justify-self: stretch;
        }
        .section-head,
        .catalog-head,

        .results-nav-head,
        .masthead-top {
          align-items: start;
          flex-direction: column;
        }
        .results-nav-line {
          grid-template-columns: 1fr;
        }
        .results-nav-label {
          padding-top: 0;
        }
        .toolbar-grid {
          grid-template-columns: 1fr;
        }
        .toolbar-grid .field:first-child {
          grid-column: auto;
        }

        }

          flex: 1;
        }
      }

        previewBestFor: document.getElementById('preview-best-for'),
        previewMoodLabel: document.getElementById('preview-mood-label'),
        previewMood: document.getElementById('preview-mood'),
        previewNote: document.getElementById('preview-note'),
        previewOfficialLink: document.getElementById('preview-official-link'),
        previewDesignLink: document.getElementById('preview-design-link'),
      };

      function strings() {
        return payload.ui[state.lang];
      }

      function renderTemplate(template, values) {
        return template.replace(/\{(\w+)\}/g, (_, key) => values[key] ?? '');
      }

      function thumbMarkup(item, variant = '') {
        if (item.thumb_path) {
          return `<div class="thumb-media"><img src="../${item.thumb_path}" alt="${displayName(item)} thumbnail" loading="lazy" /></div>`;
        }
        return `<div class="thumb-media"><div class="thumb-fallback ${variant}">${strings().preview_only}</div></div>`;
      }

      function localPreviewHref(item) {
        return `#preview=${encodeURIComponent(item.slug)}`;
      }

      function previewActionMarkup(item, className = 'primary') {
        return `<a class="${className}" href="${localPreviewHref(item)}" data-preview-slug="${item.slug}">${strings().preview_entry}</a>`;
      }

      function joinList(list) {
        return state.lang === 'zh' ? list.join('、') : list.join(' / ');
      }

      function hasActiveFilters() {
        return Boolean(state.search.trim()) || state.category !== 'all' || state.layout !== 'all';
      }

      function syncModeFromFilters() {
        state.mode = hasActiveFilters() ? 'results' : 'browse';
      }

      function displayName(item) {
        return state.lang === 'zh' ? (item.name_zh || item.name) : item.name;
      }

      function displayCategory(item) {
        return state.lang === 'zh' ? item.category_zh : item.category_en;
      }

      function displayLayout(item) {
        return state.lang === 'zh' ? item.layout_label_zh : item.layout_label_en;
      }

      function displayImpression(item) {
        return state.lang === 'zh' ? item.plain_impression_zh : item.plain_impression_en;
      }

      function displayBestFor(item) {
        return state.lang === 'zh' ? item.best_for_zh : item.best_for_en;
      }

      function displayMood(item) {
        return state.lang === 'zh' ? item.mood_keywords_zh : item.mood_keywords_en;
      }

      function displayHotReason(item) {
        return state.lang === 'zh' ? item.hot_reason_zh : item.hot_reason_en;
      }

      function renderPreview(item, updateHash = true) {
        const ui = strings();
        dom.previewThumb.innerHTML = thumbMarkup(item);
        dom.previewLayout.textContent = displayLayout(item);
        dom.previewTitle.textContent = displayName(item);
        dom.previewCategory.textContent = displayCategory(item);
        dom.previewSummary.textContent = displayImpression(item);
        dom.previewBestForLabel.textContent = ui.best_for_label;
        dom.previewBestFor.textContent = joinList(displayBestFor(item));
        dom.previewMoodLabel.textContent = ui.mood_label;
        dom.previewMood.textContent = joinList(displayMood(item));
        dom.previewNote.textContent = ui.preview_note;
        dom.previewOfficialLink.href = item.preview_url;
        dom.previewOfficialLink.textContent = ui.official_preview;
        dom.previewDesignLink.href = item.design_url;
        dom.previewDesignLink.textContent = ui.official_design;
        dom.previewClose.setAttribute('aria-label', ui.preview_close);
        dom.previewModal.classList.remove('hidden');
        document.body.classList.add('preview-open');
        if (updateHash) {
          history.pushState(null, '', localPreviewHref(item));
        }
      }

      function closePreview(updateHash = true) {
        dom.previewModal.classList.add('hidden');
        document.body.classList.remove('preview-open');
        if (updateHash && location.hash.startsWith('#preview=')) {
          history.pushState(null, '', `${location.pathname}${location.search}`);
        }
      }

      function previewSlugFromHash() {
        if (!location.hash.startsWith('#preview=')) return null;
        return decodeURIComponent(location.hash.replace('#preview=', ''));
      }

      function searchHaystack(item) {
        return [
          item.name,
          item.name_zh,
          item.category_en,
          item.category_zh,
          item.layout_label_en,
          item.layout_label_zh,
          item.plain_impression_en,
          item.plain_impression_zh,
          ...(item.best_for_en || []),
          ...(item.best_for_zh || []),
          ...(item.mood_keywords_en || []),
          ...(item.mood_keywords_zh || []),
        ].join(' ').toLowerCase();
      }

      function categoryLabelByKey(key) {
        const match = payload.categories.find((category) => category.key === key);
        if (!match) return '';
        return state.lang === 'zh' ? match.zh : match.en;
      }

      function layoutLabelByKey(key) {
        const match = payload.layouts.find((layout) => layout.key === key);
        if (!match) return '';
        return state.lang === 'zh' ? match.zh : match.en;
      }

      function activeFilterItems() {
        const chips = [];
        if (state.search.trim()) {
          chips.push(`"${state.search.trim()}"`);
        }
        if (state.category !== 'all') {
          chips.push(categoryLabelByKey(state.category));
        }
        if (state.layout !== 'all') {
          chips.push(layoutLabelByKey(state.layout));
        }
        return chips;
      }

      function renderSelectOptions(select, list, allLabel, currentValue) {
        select.innerHTML = [
          `<option value="all">${allLabel}</option>`,
          ...list.map((item) => {
            const label = state.lang === 'zh' ? item.zh : item.en;
            return `<option value="${item.key}">${label}</option>`;
          }),
        ].join('');
        select.value = currentValue;
      }

      function focusResultsSearch() {
        requestAnimationFrame(() => {
          dom.resultsSearchInput.focus();
          const length = dom.resultsSearchInput.value.length;
          dom.resultsSearchInput.setSelectionRange(length, length);
        });
      }

      function scrollToResults(keepTyping = false) {
        requestAnimationFrame(() => {
          const target = state.mode === 'results' && !dom.resultsNavShell.classList.contains('hidden')
            ? dom.resultsNavShell
            : dom.catalogSection;
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
          if (keepTyping) {
            focusResultsSearch();
          }
        });
      }

      function scrollToBrowse() {
        requestAnimationFrame(() => {
          dom.masthead.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
      }

      function filteredItems() {
        const query = state.search.trim().toLowerCase();
        return payload.items.filter((item) => {
          if (state.category !== 'all' && item.category_key !== state.category) return false;
          if (state.layout !== 'all' && item.layout_key !== state.layout) return false;
          if (!query) return true;
          return searchHaystack(item).includes(query);
        });
      }

      function renderHero() {
        const ui = strings();
        document.title = ui.page_title;
        dom.heroEyebrow.textContent = ui.eyebrow;
        dom.heroTitle.textContent = ui.hero_title;
        dom.heroDescription.textContent = ui.hero_description;
        dom.heroMeta.innerHTML = ui.hero_stats
          .map((chip) => `<span>${renderTemplate(chip, { count: payload.items.length })}</span>`)
          .join('');
        dom.guideTitle.textContent = ui.guide_title;
        dom.guideCopy.textContent = ui.guide_copy;
        dom.guidePathLabel.textContent = ui.guide_path_label;
        dom.guidePathValue.textContent = ui.guide_path_value;
        dom.guideSteps.innerHTML = ui.guide_steps.map((step) => `<li>${step}</li>`).join('');
        dom.guideReadmeLink.textContent = ui.guide_readme;
        dom.guideSkillLink.textContent = ui.guide_skill;
        dom.langZh.textContent = ui.language_zh;
        dom.langEn.textContent = ui.language_en;
        dom.langZh.classList.toggle('active', state.lang === 'zh');
        dom.langEn.classList.toggle('active', state.lang === 'en');
      }

      function renderFilters() {
        const ui = strings();
        dom.filtersTitle.textContent = ui.filters_title;
        dom.filtersNote.textContent = ui.result_note;
        dom.searchLabel.textContent = ui.search_label;
        dom.searchInput.placeholder = ui.search_placeholder;
        dom.categoryLabel.textContent = ui.category_label;
        dom.layoutLabel.textContent = ui.layout_label;
        dom.searchInput.value = state.search;
        renderSelectOptions(dom.categorySelect, payload.categories, ui.category_all, state.category);
        renderSelectOptions(dom.layoutSelect, payload.layouts, ui.layout_all, state.layout);
      }

      function renderResultsToolbar(items) {
        const ui = strings();
        const visible = state.mode === 'results';
        dom.resultsToolbarShell.classList.toggle('hidden', !visible);
        if (!visible) {
          return;
        }
        dom.resultsToolbarTitle.textContent = ui.results_toolbar_title;
        dom.resultsToolbarCopy.textContent = ui.results_mode_copy;
        dom.resultsSearchLabel.textContent = ui.sticky_search_label;
        dom.resultsCategoryLabel.textContent = ui.sticky_category_label;
        dom.resultsLayoutLabel.textContent = ui.sticky_layout_label;
        dom.resultsSearchInput.placeholder = ui.search_placeholder;
        dom.resultsSearchInput.value = state.search;
        renderSelectOptions(dom.resultsCategorySelect, payload.categories, ui.category_all, state.category);
        renderSelectOptions(dom.resultsLayoutSelect, payload.layouts, ui.layout_all, state.layout);
        dom.resultsCountLabel.textContent = ui.results_count_label;
        dom.resultsCountChip.innerHTML = `<span class="results-chip">${renderTemplate(ui.result_count, { visible: items.length, total: payload.items.length })}</span>`;
        dom.clearFiltersBtn.textContent = ui.clear_filters;
        dom.returnBrowseBtn.textContent = ui.return_browse;
      }

      function compactHotItems() {
        return payload.global_hot
          .slice(0, 5)
          .map((slug, index) => {
            const item = itemsBySlug.get(slug);
            return {
              href: localPreviewHref(item),
              slug: item.slug,
              thumb: item.thumb_path ? `../${item.thumb_path}` : null,
              title: displayName(item),
              subtitle: renderTemplate(strings().rank_badge, { rank: index + 1 }),
            };
          });
      }

      function compactCategoryItems() {
        return payload.category_hot
          .slice(0, 6)
          .map((bucket) => {
            const lead = itemsBySlug.get(bucket.items[0]);
            const label = state.lang === 'zh' ? bucket.category_zh : bucket.category_en;
            return {
              href: localPreviewHref(lead),
              slug: lead.slug,
              thumb: lead.thumb_path ? `../${lead.thumb_path}` : null,
              title: label,
              subtitle: displayName(lead),
            };
          });
      }

      function renderCompactChips(target, items) {
        target.innerHTML = items
          .map((item) => `
            <a class="compact-chip" href="${item.href}" data-preview-slug="${item.slug}">
              ${item.thumb ? `<img src="${item.thumb}" alt="${item.title} thumbnail" loading="lazy" />` : `<span class="compact-chip-icon">${strings().preview_only}</span>`}
              <span class="compact-chip-text">
                <span class="compact-chip-title">${item.title}</span>
                <span class="compact-chip-subtitle">${item.subtitle}</span>
              </span>
            </a>
          `)
          .join('');
      }

      function renderResultsNav() {
        const ui = strings();
        const visible = state.mode === 'results';
        dom.resultsNavShell.classList.toggle('hidden', !visible);
        dom.globalHotSection.classList.toggle('hidden', visible);
        dom.categoryHotSection.classList.toggle('hidden', visible);
        if (!visible) {
          return;
        }
        dom.resultsNavTitle.textContent = ui.results_nav_title;
        dom.resultsNavCopy.textContent = ui.results_nav_copy;
        dom.resultsHotLineLabel.textContent = ui.results_hot_line;
        dom.resultsCategoryLineLabel.textContent = ui.results_category_line;
        renderCompactChips(dom.resultsHotLine, compactHotItems());
        renderCompactChips(dom.resultsCategoryLine, compactCategoryItems());
      }

      function renderGlobalHot() {
        const ui = strings();
        dom.globalHotOverline.textContent = ui.global_hot_overline;
        dom.globalHotTitle.textContent = ui.global_hot_title;
        dom.globalHotCopy.textContent = ui.global_hot_copy;
        dom.globalResultCount.textContent = renderTemplate(ui.result_count, {
          visible: payload.items.length,
          total: payload.items.length,
        });
        dom.globalHotList.innerHTML = payload.global_hot
          .map((slug, index) => {
            const item = itemsBySlug.get(slug);
            return `
              <article class="rank-card">
                ${thumbMarkup(item)}
                <div class="rank-body">
                  <div class="rank-top">
                    <span class="rank-badge">${renderTemplate(ui.rank_badge, { rank: index + 1 })}</span>
                    <span class="layout-pill">${displayLayout(item)}</span>
                  </div>
                  <h3>${displayName(item)}</h3>
                  <p class="rank-category">${displayCategory(item)}</p>
                  <p class="clamp-3">${displayHotReason(item)}</p>
                  <div class="rank-actions">
                    ${previewActionMarkup(item)}
                  </div>
                </div>
              </article>
            `;
          })
          .join('');
      }

      function renderCategoryHot() {
        const ui = strings();
        dom.categoryHotOverline.textContent = ui.category_hot_overline;
        dom.categoryHotTitle.textContent = ui.category_hot_title;
        dom.categoryHotCopy.textContent = ui.category_hot_copy;
        dom.categoryHotList.innerHTML = payload.category_hot
          .map((bucket) => {
            const categoryLabel = state.lang === 'zh' ? bucket.category_zh : bucket.category_en;
            const cards = bucket.items
              .map((slug, index) => {
                const item = itemsBySlug.get(slug);
                return `
                  <article class="mini-card">
                    ${thumbMarkup(item, 'mini-thumb-fallback')}
                    <div class="mini-card-body">
                      <div class="rank-top">
                        <span class="mini-pill">${renderTemplate(ui.rank_badge, { rank: index + 1 })}</span>
                        <span class="layout-pill">${displayLayout(item)}</span>
                      </div>
                      <h4>${displayName(item)}</h4>
                      <p class="clamp-2">${displayHotReason(item)}</p>
                      <div class="rank-actions">
                        ${previewActionMarkup(item)}
                      </div>
                    </div>
                  </article>
                `;
              })
              .join('');
            return `
              <section class="category-panel">
                <div class="category-panel-head">
                  <h3>${categoryLabel}</h3>
                  <span class="mini-pill">${ui.category_top_label}</span>
                </div>
                <div class="mini-list">${cards}</div>
              </section>
            `;
          })
          .join('');
      }

      function renderAllCards() {
        const ui = strings();
        const items = filteredItems();
        dom.catalogTitle.textContent = state.mode === 'results' ? ui.results_mode_title : ui.all_styles_title;
        dom.catalogResultCount.textContent = renderTemplate(ui.result_count, {
          visible: items.length,
          total: payload.items.length,
        });
        dom.catalogResultNote.textContent = state.mode === 'results' ? ui.browse_reset_hint : ui.result_note;
        dom.resultsMeta.classList.toggle('hidden', state.mode !== 'results');

        const filterChips = activeFilterItems();
        dom.activeFilterChips.innerHTML = filterChips.length
          ? filterChips.map((chip) => `<span class="results-chip">${chip}</span>`).join('')
          : `<span class="results-chip">${ui.active_filters_label} · ${ui.no_active_filters}</span>`;

        dom.emptyStateTitle.textContent = ui.no_results_title;
        dom.emptyStateCopy.textContent = ui.no_results_copy;
        dom.emptyClearBtn.textContent = ui.clear_filters;
        dom.emptyBrowseBtn.textContent = ui.return_browse;

        const hasItems = items.length > 0;
        dom.emptyState.classList.toggle('hidden', hasItems);
        dom.allCards.classList.toggle('hidden', !hasItems);
        if (!hasItems) {
          dom.allCards.innerHTML = '';
          return items;
        }

        dom.allCards.innerHTML = items
          .map((item) => `
            <article class="full-card" data-name="${item.name.toLowerCase()}">
              <div class="thumb-wrap">
                ${thumbMarkup(item)}
              </div>
              <div class="card-body">
                <div class="card-top">
                  <h3>${displayName(item)}</h3>
                  <span class="layout-pill">${displayLayout(item)}</span>
                </div>
                <p class="category-line">${displayCategory(item)}</p>
                <p class="summary clamp-2">${displayImpression(item)}</p>
                <dl class="meta">
                  <div><dt>${ui.best_for_label}</dt><dd>${joinList(displayBestFor(item))}</dd></div>
                  <div><dt>${ui.mood_label}</dt><dd>${joinList(displayMood(item))}</dd></div>
                </dl>
                <div class="card-actions">
                  ${previewActionMarkup(item)}
                </div>
              </div>
            </article>
          `)
          .join('');
        return items;
      }

      function applyFilterChange(key, value, options = {}) {
        const previousMode = state.mode;
        state[key] = value;
        syncModeFromFilters();
        const items = render();
        if (state.mode === 'results' && (previousMode !== 'results' || options.scroll)) {
          scrollToResults(Boolean(options.keepTyping));
        }
        return items;
      }

      function clearFilters(options = {}) {
        state.search = '';
        state.category = 'all';
        state.layout = 'all';
        syncModeFromFilters();
        render();
        if (options.scrollTop) {
          scrollToBrowse();
        }
      }

      function render() {
        syncModeFromFilters();
        renderHero();
        renderFilters();
        const items = filteredItems();
        renderResultsToolbar(items);
        renderResultsNav();
        renderGlobalHot();
        renderCategoryHot();
        renderAllCards();
        const previewSlug = previewSlugFromHash();
        if (previewSlug && !dom.previewModal.classList.contains('hidden')) {
          const item = itemsBySlug.get(previewSlug);
          if (item) renderPreview(item, false);
        }
        return items;
      }

      dom.langZh.addEventListener('click', () => {
        state.lang = 'zh';
        render();
      });
      dom.langEn.addEventListener('click', () => {
        state.lang = 'en';
        render();
      });
      dom.searchInput.addEventListener('input', (event) => {
        applyFilterChange('search', event.target.value, { scroll: true, keepTyping: true });
      });
      dom.categorySelect.addEventListener('change', (event) => {
        applyFilterChange('category', event.target.value, { scroll: true });
      });
      dom.layoutSelect.addEventListener('change', (event) => {
        applyFilterChange('layout', event.target.value, { scroll: true });
      });
      dom.resultsSearchInput.addEventListener('input', (event) => {
        applyFilterChange('search', event.target.value);
      });
      dom.resultsCategorySelect.addEventListener('change', (event) => {
        applyFilterChange('category', event.target.value);
      });
      dom.resultsLayoutSelect.addEventListener('change', (event) => {
        applyFilterChange('layout', event.target.value);
      });
      dom.clearFiltersBtn.addEventListener('click', () => {
        clearFilters();
      });
      dom.returnBrowseBtn.addEventListener('click', () => {
        clearFilters({ scrollTop: true });
      });
      dom.emptyClearBtn.addEventListener('click', () => {
        clearFilters();
      });
      dom.emptyBrowseBtn.addEventListener('click', () => {
        clearFilters({ scrollTop: true });
      });
      document.addEventListener('click', (event) => {
        const trigger = event.target.closest('[data-preview-slug]');
        if (!trigger) return;
        const item = itemsBySlug.get(trigger.dataset.previewSlug);
        if (!item) return;
        event.preventDefault();
        renderPreview(item);
      });
      dom.previewClose.addEventListener('click', () => {
        closePreview();
      });
      dom.previewBackdrop.addEventListener('click', () => {
        closePreview();
      });
      window.addEventListener('keydown', (event) => {
        if (event.key === 'Escape' && !dom.previewModal.classList.contains('hidden')) {
          closePreview();
        }
      });
      window.addEventListener('hashchange', () => {
        const slug = previewSlugFromHash();
        if (!slug) {
          closePreview(false);
          return;
        }
        const item = itemsBySlug.get(slug);
        if (item) {
          renderPreview(item, false);
        }
      });

      render();
      const initialPreviewSlug = previewSlugFromHash();
      if (initialPreviewSlug && itemsBySlug.has(initialPreviewSlug)) {
        renderPreview(itemsBySlug.get(initialPreviewSlug), false);
      }
    </script>
  </body>
</html>
